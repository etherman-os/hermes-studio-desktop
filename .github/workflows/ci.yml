name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. test-worker — Unit tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m venv .venv
          source .venv/bin/activate && pip install -e ".[dev]"

      - name: Python lint (ruff)
        run: |
          source .venv/bin/activate
          .venv/bin/ruff check packages/hermes_adapter/hermes_adapter packages/hermes_adapter/tests

      - name: Python typecheck (mypy)
        run: |
          source .venv/bin/activate
          .venv/bin/mypy packages/hermes_adapter/hermes_adapter

      - name: Frontend unit tests
        run: pnpm --filter @hermes-desktop-studio/desktop-studio test

      - name: Adapter tests
        run: |
          source .venv/bin/activate
          .venv/bin/pytest -q --tb=short

  # ─────────────────────────────────────────────────────────────
  # 2. qa-worker — Lint, typecheck, format
  # ─────────────────────────────────────────────────────────────
  qa:
    name: Quality Assurance
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m venv .venv
          source .venv/bin/activate && pip install -e ".[dev]"

      - name: TypeScript typecheck
        run: pnpm run check:types

      - name: Python lint (ruff)
        run: |
          source .venv/bin/activate
          .venv/bin/ruff check packages/hermes_adapter/hermes_adapter

      - name: Python typecheck (mypy)
        run: |
          source .venv/bin/activate
          .venv/bin/mypy packages/hermes_adapter/hermes_adapter

  # ─────────────────────────────────────────────────────────────
  # 3. audit-worker — Security scan
  # ─────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m venv .venv
          source .venv/bin/activate && pip install -e ".[dev]"

      - name: Python security checks (ruff)
        run: |
          source .venv/bin/activate
          # Ruff catches: F* (pyflakes), S* (bandit security)
          .venv/bin/ruff check packages/hermes_adapter/hermes_adapter --select F,S

      - name: Check for secrets in code
        run: |
          # Basic secret detection using ruff
          source .venv/bin/activate
          .venv/bin/ruff check packages/hermes_adapter/hermes_adapter --select S

  # ─────────────────────────────────────────────────────────────
  # 4. docs-worker — Documentation update
  # ─────────────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for doc changes
        id: doc-check
        run: |
          if git diff --name-only | grep -qE '\.(md|txt)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate markdown links
        if: steps.doc-check.outputs.changed == 'true'
        run: |
          # Basic markdown validation
          for f in $(git diff --name-only | grep '\.md$'); do
            echo "Checking $f"
          done

  # ─────────────────────────────────────────────────────────────
  # 5. build gate — Release artifact build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-latest' && 'x86_64-unknown-linux-gnu' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m venv .venv
          source .venv/bin/activate && pip install -e ".[dev]"

      - name: Frontend build
        run: pnpm run build

      - name: Tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .venv/bin/activate
          pnpm tauri build --target ${{ matrix.platform == 'ubuntu-latest' && 'x86_64-unknown-linux-gnu' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            apps/desktop-studio/src-tauri/target/*/release/bundle/**
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 6. github-manager — GitHub Release / PR merge
  # ─────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/bundle/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
