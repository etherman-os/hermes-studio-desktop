[meta]
id = "default-dark"
name = "Default Dark"
version = "0.1.0"
author = "etherman-os"
description = "Clean professional dark theme with blue accent."
keywords = ["studio"]

[compat]
shell_api = "^1.0"
adapter_api = "^1.0"
min_hermes = "0.11.0"

[palette]
bg = "#0f1117"
surface = "#1a1d24"
surface_alt = "#242830"
panel = "#1e222a"
border = "#3a3f4b"
text = "#e6e6e6"
muted = "#8b949e"
accent = "#58a6ff"
accent_alt = "#79c0ff"
ok = "#3fb950"
warn = "#d29922"
danger = "#f85149"
info = "#58a6ff"
status_bg = "#161b22"

[borders]
style = "thin"
horizontal = "─"
vertical = "│"
corner_tl = "┌"
corner_tr = "┐"
corner_bl = "└"
corner_br = "┘"
separator = "│"

[icons]
profile = "👤"
session = "💬"
memory = "🧠"
tools = "🔧"
logs = "📋"
command = "⌨"
automation = "⚙"
agent = "🤖"
approval = "🔒"

[labels]
profiles = "Profiles"
sessions = "Sessions"
chat = "Chat"
kanban = "Kanban"
artifacts = "Artifacts"
tools = "Tools"
memory = "Memory"
logs = "Logs"
activity = "Activity"
inspector = "Inspector"
command_palette = "Command Palette"
settings = "Settings"
theme_gallery = "Themes"
composer = "Composer"
send = "Send"
stop = "Stop"
resume = "Resume"
approve = "Approve"
deny = "Deny"
search = "Search"

[chat]
assistant_prefix = "🤖 Hermes"
user_prefix = "👤 You"
tool_prefix = "🔧 Tool"
approval_prefix = "🔒 Approval"

[assets]
banner = """
┌─────────────────────────────┐
│      HERMES LOCAL SHELL     │
│   Local-first AI workspace  │
└─────────────────────────────┘
"""
