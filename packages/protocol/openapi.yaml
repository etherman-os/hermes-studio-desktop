openapi: "3.1.0"
info:
  title: Hermes Desktop Studio Adapter API
  description: |
    Local adapter contract for Hermes Desktop Studio.
    The adapter sits between the desktop UI and Hermes Agent, providing
    a stable, normalized API. The UI must never talk to Hermes directly.
  version: "0.1.0"
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:39191
    description: Local adapter (development)

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Adapter health check for CLI/dev tooling
      description: |
        Public adapter-level health endpoint for development and CLI tooling.
        The desktop frontend uses /studio/health instead.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Adapter is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /studio/health:
    get:
      summary: Studio health check
      description: Canonical desktop frontend health endpoint.
      operationId: getStudioHealth
      security: []
      responses:
        "200":
          description: Studio adapter health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /studio/bootstrap:
    get:
      summary: Initial bootstrap payload
      description: |
        Returns adapter info, active profile, capabilities, recent sessions,
        active theme, and available models. Called once on app startup.
      operationId: getBootstrap
      responses:
        "200":
          description: Bootstrap data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/profiles:
    get:
      summary: List Hermes profiles
      operationId: getProfiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileInfo"

  /studio/profiles/active:
    get:
      summary: Active Hermes profile
      operationId: getActiveProfile
      responses:
        "200":
          description: Active profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileInfo"

  /studio/profiles/activate:
    post:
      summary: Activate a Hermes profile
      description: Currently returns not_implemented unless a safe CLI-backed path exists.
      operationId: activateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_id:
                  type: string
              required:
                - profile_id
      responses:
        "200":
          description: Profile activated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "501":
          description: Safe profile switching is not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/sessions:
    get:
      summary: List sessions
      description: Session metadata from state.db (read-only).
      operationId: getSessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          description: Search query for session titles
          schema:
            type: string
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
                  total:
                    type: integer
                required:
                  - sessions
                  - total

  /studio/sessions/{session_id}:
    get:
      summary: Session details
      description: Session detail with transcript preview.
      operationId: getSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/sessions/{session_id}/approvals:
    get:
      summary: List approvals for a session
      description: Studio-owned approval history filtered by session id.
      operationId: getSessionApprovals
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/approvals:
    get:
      summary: List Studio-owned approval records
      description: Approval visibility and history stored in studio.db.
      operationId: listApprovals
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
        - name: risk_level
          in: query
          schema:
            $ref: "#/components/schemas/ApprovalRiskLevel"
        - name: run_id
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        "200":
          description: Approval records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/approvals/pending:
    get:
      summary: List pending approvals
      operationId: listPendingApprovals
      responses:
        "200":
          description: Pending approval records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/approvals/{approval_id}:
    get:
      summary: Approval detail
      operationId: getApproval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDetail"
        "404":
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/approvals/{approval_id}/approve:
    post:
      summary: Attempt to approve an approval request
      description: Returns 501 until a verified Hermes approval response API is wired.
      operationId: approveApproval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          description: Approval response not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/approvals/{approval_id}/deny:
    post:
      summary: Attempt to deny an approval request
      description: Returns 501 until a verified Hermes approval response API is wired.
      operationId: denyApproval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          description: Approval response not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs:
    post:
      summary: Start a new run
      operationId: startRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/recent:
    get:
      summary: Recent persisted run ledger records
      description: Recent Studio-owned run records from studio.db.
      operationId: getRecentRuns
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Recent runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLedgerRecentResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Studio run history is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/compare:
    get:
      summary: Compare two persisted run ledger records
      description: Compares Studio-owned run summaries and event counts without reading Hermes state.db.
      operationId: compareRuns
      parameters:
        - name: left_run_id
          in: query
          required: true
          schema:
            type: string
        - name: right_run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLedgerComparison"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/{run_id}:
    get:
      summary: Persisted run ledger record
      description: Studio-owned run metadata by run id.
      operationId: getRun
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLedgerRun"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/{run_id}/ledger:
    get:
      summary: Persisted run event ledger
      description: Studio-owned run metadata and normalized Studio event envelopes.
      operationId: getRunLedger
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLedgerResponse"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/{run_id}/approvals:
    get:
      summary: List approvals for a run
      description: Studio-owned approval history filtered by run id.
      operationId: getRunApprovals
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/{run_id}/events:
    get:
      summary: SSE event stream for a run
      description: |
        Server-Sent Events stream of normalized events for an active run.
        Events follow the studio event schema (see events.schema.json).
        The adapter normalizes Hermes SSE into stable studio events.
      operationId: streamRunEvents
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/runs/{run_id}/stop:
    post:
      summary: Stop an active run
      operationId: stopRun
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  status:
                    type: string
                    enum:
                      - stopping
                      - cancelled
                      - completed
                      - failed
                required:
                  - run_id
                  - status

  /studio/logs:
    get:
      summary: Log metadata and recent lines
      operationId: getLogs
      parameters:
        - name: source
          in: query
          description: Log source filter
          schema:
            type: string
        - name: tail
          in: query
          description: Number of recent lines to return
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Log data
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                  lines:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
                required:
                  - source
                  - lines

  /studio/logs/stream:
    get:
      summary: Live log stream
      description: SSE stream of live log lines.
      operationId: streamLogs
      parameters:
        - name: source
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SSE log stream
          content:
            text/event-stream:
              schema:
                type: string

  /studio/model-config:
    get:
      summary: Read-only normalized model/provider config
      operationId: getModelConfig
      responses:
        "200":
          description: Model/provider config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelConfig"
    patch:
      summary: Safely update model/provider config
      description: Mock backend applies updates. Hermes backend does not write Hermes config files directly and returns 501 until Hermes exposes a safe public API or CLI.
      operationId: updateModelConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelConfigPatch"
      responses:
        "200":
          description: Model/provider config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelConfig"
        "400":
          description: Invalid model config update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Backend has no safe public model config write path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/model-config/models:
    get:
      summary: List available model options
      operationId: listAvailableModels
      responses:
        "200":
          description: Available model options with provider metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  /studio/hermes/inventory:
    get:
      summary: Read local Hermes capability inventory
      operationId: getHermesInventory
      responses:
        "200":
          description: Local Hermes provider, model, skill, MCP, and toolset inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesInventory"

  /studio/hermes/cli:
    get:
      summary: Inspect local Hermes CLI capabilities
      operationId: getHermesCli
      responses:
        "200":
          description: Local Hermes CLI version and supported commands/flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesCliStatus"

  /studio/hermes/release:
    get:
      summary: Inspect local Hermes version and update availability
      operationId: getHermesRelease
      responses:
        "200":
          description: Hermes version and update check status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesReleaseStatus"

  /studio/hermes/checkpoints/status:
    get:
      summary: Inspect Hermes v0.13 checkpoint store status
      operationId: getHermesCheckpointStatus
      responses:
        "200":
          description: Checkpoint store status from hermes checkpoints status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesCheckpointStoreStatus"

  /studio/hermes/checkpoints/prune:
    post:
      summary: Prune the Hermes filesystem checkpoint store
      operationId: pruneHermesCheckpointStore
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                retention_days:
                  type: integer
                  minimum: 1
                  maximum: 3650
                max_size_mb:
                  type: integer
                  minimum: 1
                  maximum: 102400
                keep_orphans:
                  type: boolean
      responses:
        "200":
          description: Hermes checkpoint prune result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesCheckpointPruneResult"

  /studio/hermes/doctor:
    get:
      summary: Run Hermes doctor diagnostics
      operationId: getHermesDoctor
      responses:
        "200":
          description: Redacted Hermes doctor diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesDoctorStatus"

  /studio/hermes/browser-cache:
    get:
      summary: Inspect local browser automation caches
      operationId: getHermesBrowserCache
      responses:
        "200":
          description: Playwright and Puppeteer browser cache status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesBrowserCacheStatus"

  /studio/hermes/providers:
    get:
      summary: List local Hermes providers
      operationId: listHermesProviders
      responses:
        "200":
          description: Local Hermes provider catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesProviderList"

  /studio/hermes/fallbacks:
    get:
      summary: List configured Hermes fallback providers
      operationId: listHermesFallbacks
      responses:
        "200":
          description: Local Hermes fallback provider chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesFallbackProviderList"

  /studio/hermes/models:
    get:
      summary: List local Hermes models
      operationId: listHermesModels
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5000
      responses:
        "200":
          description: Local Hermes model catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesModelList"

  /studio/hermes/skills:
    get:
      summary: List local Hermes skills
      operationId: listHermesSkills
      responses:
        "200":
          description: Installed, bundled, and optional Hermes skills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesSkillList"

  /studio/hermes/skills/check:
    post:
      summary: Check installed Hermes skills for updates
      operationId: checkHermesSkills
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Hermes skills check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesSkillActionResult"

  /studio/hermes/skills/update:
    post:
      summary: Update installed Hermes skills
      operationId: updateHermesSkills
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Hermes skills update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesSkillActionResult"

  /studio/hermes/skills/install:
    post:
      summary: Install a Hermes skill through the Hermes CLI
      operationId: installHermesSkill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                category:
                  type: string
                name:
                  type: string
                force:
                  type: boolean
              required:
                - identifier
      responses:
        "200":
          description: Hermes skill install result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesSkillActionResult"

  /studio/hermes/mcp-servers:
    get:
      summary: List configured Hermes MCP servers
      operationId: listHermesMcpServers
      responses:
        "200":
          description: Configured local MCP servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesMcpServerList"

  /studio/hermes/mcp-servers/{server_id}/test:
    post:
      summary: Test a configured Hermes MCP server
      operationId: testHermesMcpServer
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Local Hermes MCP test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesMcpProbeResult"

  /studio/hermes/toolsets:
    get:
      summary: List configured Hermes toolsets
      operationId: listHermesToolsets
      responses:
        "200":
          description: Platform, plugin, and MCP toolsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesToolsetList"

  /studio/htg/status:
    get:
      summary: HoldTheGoblin read-only status probe
      description: |
        Returns HoldTheGoblin availability, doctor output, recent events, and
        checkpoint list. Read-only inspection only — does not create checkpoints
        or modify any project state.

        Read-only tools called:
        - doctor: project detection and scanner config
        - events --limit 20: recent event log
        - checkpoint_list: existing checkpoints
        - config_validate: HTG config validation

        NOT called (hard rule): checkpoint_create, checkpoint_rollback,
        deploy_run, verify, readiness with runVerify=true,
        policy_evaluate, risk_assess.
      operationId: getHtgStatus
      responses:
        "200":
          description: HTG status response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HtgStatusResponse"

  /studio/hermes/toolsets/configure:
    post:
      summary: Enable or disable a Hermes toolset through the Hermes CLI
      operationId: configureHermesToolset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                platform:
                  type: string
                enabled:
                  type: boolean
              required:
                - id
                - platform
                - enabled
      responses:
        "200":
          description: Updated Hermes toolset state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermesToolsetConfigureResult"

  /studio/themes:
    get:
      summary: List installed themes
      operationId: getThemes
      responses:
        "200":
          description: Theme list
          content:
            application/json:
              schema:
                type: object
                properties:
                  themes:
                    type: array
                    items:
                      $ref: "#/components/schemas/ThemeInfo"
                  active:
                    type: string
                    description: ID of the currently active theme
                required:
                  - themes

  /studio/themes/active:
    get:
      summary: Active normalized theme pack
      operationId: getActiveTheme
      responses:
        "200":
          description: Active normalized theme data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeData"

  /studio/themes/{theme_id}:
    get:
      summary: Normalized theme pack by ID
      operationId: getTheme
      parameters:
        - name: theme_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Normalized theme data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeData"
        "404":
          description: Theme not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/themes/activate:
    post:
      summary: Activate a theme
      operationId: activateTheme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                theme_id:
                  type: string
              required:
                - theme_id
      responses:
        "200":
          description: Theme activated
          content:
            application/json:
              schema:
