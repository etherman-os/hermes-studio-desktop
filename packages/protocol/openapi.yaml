      description: Returns all tool packs found in the packs directory, with their enabled/disabled state from the database.
      operationId: listToolPacks
      responses:
        "200":
          description: List of tool packs
          content:
            application/json:
              schema:
                type: object
                properties:
                  packs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolPackInfo"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/tool-packs/{pack_id}:
    get:
      summary: Get tool pack details
      description: Returns full details for a specific tool pack.
      operationId: getToolPack
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool pack details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPackInfo"
        "404":
          description: Pack not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/tool-packs/{pack_id}/enable:
    post:
      summary: Enable a tool pack
      description: Enables a discovered tool pack. The pack must be valid and compatible with the current platform.
      operationId: enableToolPack
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pack enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPackInfo"
        "400":
          description: Pack is invalid or incompatible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pack not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/tool-packs/{pack_id}/disable:
    post:
      summary: Disable a tool pack
      description: Disables a tool pack. Commands from disabled packs are not available.
      operationId: disableToolPack
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pack disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPackInfo"
        "404":
          description: Pack not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/tool-packs/install:
    post:
      summary: Install a tool pack from local path
      description: Installs a tool pack by copying its manifest into the packs directory.
      operationId: installToolPack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Path to the manifest.json file or pack directory
              required:
                - path
      responses:
        "200":
          description: Pack installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPackInfo"
        "400":
          description: Invalid path or manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/checkpoints:
    get:
      summary: List checkpoints for a workspace
      description: Returns git checkpoint commits for a workspace path.
      operationId: listCheckpoints
      parameters:
        - name: workspace_path
          in: query
          required: true
          schema:
            type: string
          description: Workspace path to scan for checkpoints
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Checkpoint list
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkpoints:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  total:
                    type: integer
        "400":
          description: Invalid workspace path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/checkpoints/{commit_hash}:
    get:
      summary: Get checkpoint details
      description: Returns a single checkpoint commit detail.
      operationId: getCheckpoint
      parameters:
        - name: commit_hash
          in: path
          required: true
          schema:
            type: string
        - name: workspace_path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Checkpoint detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Checkpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/checkpoints/{commit_hash}/diff:
    get:
      summary: Get checkpoint diff
      description: Returns the diff for a checkpoint commit.
      operationId: getCheckpointDiff
      parameters:
        - name: commit_hash
          in: path
          required: true
          schema:
            type: string
        - name: workspace_path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Checkpoint diff
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Checkpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/worktrees:
    get:
      summary: List worktrees
      description: Returns git worktrees for a workspace path.
      operationId: listWorktrees
      parameters:
        - name: workspace_path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worktree list
          content:
            application/json:
              schema:
                type: object
                properties:
                  worktrees:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  total:
                    type: integer
        "400":
          description: Invalid workspace path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a worktree
      description: Creates a new git worktree for the given branch.
      operationId: createWorktree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_path:
                  type: string
                branch:
                  type: string
                new_branch:
                  type: boolean
                  default: true
              required:
                - workspace_path
                - branch
      responses:
        "200":
          description: Worktree created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/worktrees/{worktree_id}:
    delete:
      summary: Remove a worktree
      description: Removes a git worktree by ID.
      operationId: removeWorktree
      parameters:
        - name: worktree_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worktree removed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Worktree not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/worktrees/{worktree_id}/run:
    post:
      summary: Start a run in a worktree
      description: Starts a new Hermes run within the context of a worktree.
      operationId: startRunInWorktree
      parameters:
        - name: worktree_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                session_id:
                  type: string
                  default: default
                profile:
                  type: string
                  nullable: true
              required:
                - prompt
      responses:
        "200":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Worktree not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/delegations:
    get:
      summary: List delegation/sub-agent tasks
      description: Returns delegations inferred from run events (tool events with delegation-related tool names).
      operationId: listDelegations
      parameters:
        - name: parent_run_id
          in: query
          schema:
            type: string
          description: Filter by parent run ID
        - name: status
          in: query
          schema:
            type: string
          description: Filter by delegation status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        "200":
          description: Delegation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/delegations/{delegation_id}:
    get:
      summary: Get delegation details
      description: Returns a single delegation with parent and child run details.
      operationId: getDelegation
      parameters:
        - name: delegation_id
          in: path
          required: true
          schema:
            type: string
          description: "Delegation ID (format: parent_run_id:child_run_id)"
      responses:
        "200":
          description: Delegation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationDetail"
        "404":
          description: Delegation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/cron-jobs:
    get:
      summary: List scheduled cron jobs
      description: Returns cron jobs from ~/.hermes/cron/ directory.
      operationId: listCronJobs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        "200":
          description: Cron job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronJobListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /studio/cron-jobs/{job_id}:
    get:
      summary: Get cron job details
      description: Returns a single cron job definition.
      operationId: getCronJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Cron job ID
      responses:
        "200":
          description: Cron job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronJob"
        "404":
          description: Cron job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Ephemeral token from ~/.hermes-local-shell/runtime/token

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
        adapter_version:
          type: string
        hermes_connected:
          type: boolean
        uptime_seconds:
          type: number
        storage:
          $ref: "#/components/schemas/StorageStatus"
      required:
        - status
        - adapter_version
        - hermes_connected

    BootstrapResponse:
      type: object
      properties:
        adapter_version:
          type: string
        hermes_version:
          type: string
        active_profile:
          type: string
          nullable: true
        capabilities:
          type: array
          items:
            type: string
        recent_sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionSummary"
        active_theme:
          $ref: "#/components/schemas/ThemeInfo"
        available_models:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              provider:
                type: string
            required:
              - id
              - name
        storage:
          $ref: "#/components/schemas/StorageStatus"
      required:
        - adapter_version
        - capabilities
        - recent_sessions

    StorageStatus:
      type: object
      properties:
        available:
          type: boolean
        schema_version:
          type: integer
        data_dir:
          type: string
          description: Diagnostic path to the Studio-owned data directory.
        db_path:
          type: string
          description: Diagnostic path to the Studio-owned SQLite database.
        last_error:
          type: string
          nullable: true
      required:
        - available
        - schema_version
        - data_dir
        - db_path
        - last_error

    ProfileInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        active:
          type: boolean
        is_active:
          type: boolean
        has_config:
          type: boolean
        has_state_db:
          type: boolean
        session_count:
          type: integer
      required:
        - name
        - path

    SessionSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer
        profile:
          type: string
          nullable: true
      required:
        - id
        - title
        - created_at
        - updated_at
        - message_count

    SessionDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer
        profile:
          type: string
          nullable: true
        transcript_preview:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptMessage"
      required:
        - id
        - title
        - created_at
        - updated_at
        - message_count

    TranscriptMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
            - tool
            - system
        content:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - role
        - content

    RunRequest:
      type: object
      properties:
        session_id:
          type: string
        prompt:
          type: string
        profile:
          type: string
          nullable: true
        workspace_path:
          type: string
          nullable: true
          description: Studio-side workspace/project path metadata. Not forwarded to Hermes unless officially supported.
        context:
          type: object
          description: Optional additional context (files, artifacts)
          additionalProperties: true
      required:
        - session_id
        - prompt

    RunResponse:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string
          enum:
            - started
            - queued
            - stopping
            - cancelled
            - failed
      required:
        - run_id
        - status

    RunLedgerRun:
      type: object
      properties:
        id:
          type: string
        session_id:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
            - cancelled
            - stopping
            - idle
        title:
          type: string
          nullable: true
        prompt_preview:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        backend:
          type: string
        model:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        workspace_path:
          type: string
          nullable: true
      required:
        - id
        - status
        - started_at
        - backend

    RunLedgerEvent:
      type: object
      description: Persisted Studio event envelope for a run.
      properties:
        id:
          type: string
        type:
          type: string
        timestamp:
          type: string
          format: date-time
        source:
          type: string
          enum:
            - adapter
            - hermes
            - studio
        payload:
          type: object
          additionalProperties: true
        run_id:
          type: string
        session_id:
          type: string
          nullable: true
      required:
        - id
        - type
        - timestamp
        - source
        - payload
        - run_id

    RunLedgerRecentResponse:
      type: object
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/RunLedgerRun"
        total:
          type: integer
        history_available:
          type: boolean
      required:
        - runs
        - total
        - history_available

    RunLedgerResponse:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/RunLedgerRun"
        events:
          type: array
          items:
            $ref: "#/components/schemas/RunLedgerEvent"
        history_available:
          type: boolean
      required:
        - run
        - events
        - history_available

    RunLedgerCompareSummary:
      type: object
      properties:
        run_id:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        backend:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        workspace_path:
          type: string
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        event_count:
          type: integer
        event_type_counts:
          type: object
          additionalProperties:
            type: integer
        tool_names:
          type: array
          items:
            type: string
        warning_count:
          type: integer
        error_count:
          type: integer
        approval_count:
          type: integer
        assistant_chars:
          type: integer
      required:
        - event_count
        - event_type_counts
        - tool_names
        - warning_count
        - error_count
        - approval_count
        - assistant_chars

    RunLedgerCompareDelta:
      type: object
      properties:
        status_changed:
          type: boolean
        model_changed:
          type: boolean
        backend_changed:
          type: boolean
        duration_delta_ms:
          type: integer
          nullable: true
        event_count_delta:
          type: integer
        warning_delta:
          type: integer
        error_delta:
          type: integer
        assistant_char_delta:
          type: integer
        added_tools:
          type: array
          items:
            type: string
        removed_tools:
          type: array
          items:
            type: string
        event_type_delta:
          type: object
          additionalProperties:
            type: integer
      required:
        - status_changed
        - model_changed
        - backend_changed
        - event_count_delta
        - warning_delta
        - error_delta
        - assistant_char_delta
        - added_tools
        - removed_tools
        - event_type_delta

    RunLedgerComparison:
      type: object
      properties:
        left:
          $ref: "#/components/schemas/RunLedgerCompareSummary"
        right:
          $ref: "#/components/schemas/RunLedgerCompareSummary"
        delta:
          $ref: "#/components/schemas/RunLedgerCompareDelta"
        history_available:
          type: boolean
      required:
        - left
        - right
        - delta
        - history_available

    ApprovalStatus:
      type: string
      enum:
        - pending
        - approved
        - denied
        - expired
        - cancelled
        - unknown

    ApprovalRiskLevel:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
        - unknown

    Approval:
      type: object
      properties:
        id:
          type: string
        run_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        tool_name:
          type: string
          nullable: true
        command:
          type: string
          nullable: true
        risk_level:
          $ref: "#/components/schemas/ApprovalRiskLevel"
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        reason:
          type: string
          nullable: true
        decision:
          type: string
          nullable: true
        decided_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - risk_level
        - status
        - created_at
        - updated_at

    ApprovalEvent:
      type: object
      properties:
        id:
          type: string
        approval_id:
          type: string
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - approval_id
        - type
        - payload
        - created_at

    ApprovalDetail:
      allOf:
        - $ref: "#/components/schemas/Approval"
        - type: object
          properties:
            request_payload:
              type: object
              nullable: true
              additionalProperties: true
            events:
              type: array
              items:
                $ref: "#/components/schemas/ApprovalEvent"

    ApprovalListResponse:
      type: object
      properties:
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
        total:
          type: integer
      required:
        - approvals
        - total

    ModelConfig:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        base_url:
          type: string
          nullable: true
        api_key_configured:
          type: boolean
        api_key_source:
          type: string
          nullable: true
        config_source:
          type: string
        temperature:
          type: number
          nullable: true
        max_tokens:
          type: integer
          nullable: true
        context_window:
          type: integer
          nullable: true
        capabilities_available:
          type: boolean
        available_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelOption"
        available_model_count:
          type: integer
        warnings:
          type: array
          items:
            type: string
      required:
        - provider
        - model
        - api_key_configured
        - config_source

    ModelConfigPatch:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        model:
          type: string
        base_url:
          type: string
          nullable: true
        temperature:
          type: number
        max_tokens:
          type: integer
        context_window:
          type: integer
      minProperties: 1

    ModelList:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelOption"
      required:
        - models

    ModelOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        provider_name:
          type: string
        family:
          type: string
          nullable: true
        context_window:
          type: integer
          nullable: true
        output_limit:
          type: integer
          nullable: true
        reasoning:
          type: boolean
          nullable: true
        tool_call:
          type: boolean
          nullable: true
        structured_output:
          type: boolean
          nullable: true
        attachments:
          type: boolean
          nullable: true
        open_weights:
          type: boolean
          nullable: true
        input_modalities:
          type: array
          items:
            type: string
        output_modalities:
          type: array
          items:
            type: string
        input_cost:
          type: number
          nullable: true
        output_cost:
          type: number
          nullable: true
        release_date:
          type: string
          nullable: true
        last_updated:
          type: string
          nullable: true
        source:
          type: string
      required:
        - id
        - name
        - provider

    HermesInventory:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/HermesInventorySummary"
        providers:
          type: array
          items:
            $ref: "#/components/schemas/HermesProvider"
        models:
          type: array
